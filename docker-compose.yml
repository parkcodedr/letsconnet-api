version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: social_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_app
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: social_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
